version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: electrade_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       electrade
      POSTGRES_USER:     electrade
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U electrade"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    container_name: electrade_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV:      production
      DB_SSL:        "false"
      PORT:          3001
      DATABASE_URL:  postgres://electrade:${DB_PASSWORD}@db:5432/electrade
      JWT_SECRET:    ${JWT_SECRET}
      FRONTEND_URL:  https://tradex.haspex.co
      SMTP_HOST:     ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT:     ${SMTP_PORT:-587}
      SMTP_USER:     ${SMTP_USER:-}
      SMTP_PASS:     ${SMTP_PASS:-}
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - backups:/app/backups

  frontend:
    build: ./frontend
    container_name: electrade_web
    restart: unless-stopped
    ports:
      - "127.0.0.1:5173:80"
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    container_name: electrade_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - api
      - frontend

  certbot:
    image: certbot/certbot:latest
    container_name: electrade_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done'"

volumes:
  pgdata:
  backups:
  certbot_www:
  certbot_certs:

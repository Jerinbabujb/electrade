# ── HTTP — redirect to HTTPS + serve ACME challenge ───────
server {
    listen 80;
    server_name tradex.haspex.co;

    # Let's Encrypt / Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ──────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name tradex.haspex.co;

    ssl_certificate     /etc/letsencrypt/live/tradex.haspex.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tradex.haspex.co/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    resolver 127.0.0.11 valid=10s ipv6=off;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Simple Invoice import — SSE endpoint, large upload, long timeout
    location /api/v1/admin/import-sinvoice {
        set $backend http://electrade_api:3001;
        proxy_pass             $backend;
        proxy_http_version     1.1;
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_read_timeout     600s;
        proxy_send_timeout     600s;
        client_max_body_size   200M;
        proxy_buffering        off;
        proxy_cache            off;
        chunked_transfer_encoding on;
    }

    # API — proxy to Node backend
    location /api/ {
        set $backend http://electrade_api:3001;
        proxy_pass         $backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 50M;
    }

    # Health check
    location /health {
        set $backend http://electrade_api:3001;
        proxy_pass $backend/health;
    }

    # Frontend (React SPA)
    location / {
        set $frontend http://electrade_web:80;
        proxy_pass         $frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

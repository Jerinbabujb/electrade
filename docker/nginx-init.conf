# Temporary HTTP-only config used during initial certificate bootstrap.
# Replace nginx.conf with this file before running ssl-init.sh if nginx
# won't start because the cert files don't exist yet.
server {
    listen 80;
    server_name tradex.haspex.co;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}
